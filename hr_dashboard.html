<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Monthly Analysis Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        .container {
            width: 90%;
            margin: auto;
            overflow: hidden;
        }
        #key-metrics {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .metric {
            background: #ffffff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            flex: 1;
            margin: 0 10px;
        }
        .chart {
            background: #ffffff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background: #35424a;
            color: #ffffff;
            position: relative;
            bottom: 0;
            width: 100%;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            #key-metrics {
                flex-direction: column;
                align-items: center;
            }
            .metric {
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>HR Monthly Analysis Dashboard</h1>
    </header>
    <div class="container">
        <div id="key-metrics">
            <div class="metric">
                <h2>Total Employees</h2>
                <p id="total-employees">150</p>
            </div>
            <div class="metric">
                <h2>New Hires</h2>
                <p id="new-hires">10</p>
            </div>
            <div class="metric">
                <h2>Terminations</h2>
                <p id="terminations">5</p>
            </div>
        </div>
        <div class="chart">
            <h3>Monthly Turnover Trend</h3>
            <canvas id="turnover-trend"></canvas>
        </div>
        <div class="chart">
            <h3>Salary Distribution</h3>
            <canvas id="salary-distribution"></canvas>
        </div>
        <div class="chart">
            <h3>Department Breakdown</h3>
            <canvas id="department-breakdown"></canvas>
        </div>
        <div class="chart">
            <h3>Employee Experience Level Distribution</h3>
            <canvas id="experience-level-distribution"></canvas>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 HR Dashboard</p>
    </footer>
    <script>
        const ctx1 = document.getElementById('turnover-trend').getContext('2d');
        const turnoverTrendChart = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Turnover Rate',
                    data: [5, 7, 6, 8, 3, 4],
                    borderColor: 'rgba(75, 192, 192, 1)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        const ctx2 = document.getElementById('salary-distribution').getContext('2d');
        const salaryDistributionChart = new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['<30k', '30k-50k', '50k-70k', '70k-100k', '>100k'],
                datasets: [{
                    label: 'Number of Employees',
                    data: [10, 30, 40, 50, 20],
                    backgroundColor: 'rgba(153, 102, 255, 0.5)',
                    borderColor: 'rgba(153, 102, 255, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        const ctx3 = document.getElementById('department-breakdown').getContext('2d');
        const departmentBreakdownChart = new Chart(ctx3, {
            type: 'pie',
            data: {
                labels: ['HR', 'Finance', 'Engineering', 'Marketing'],
                datasets: [{
                    label: 'Department Distribution',
                    data: [30, 25, 20, 25],
                    backgroundColor: ['rgba(255, 99, 132, 0.5)', 'rgba(54, 162, 235, 0.5)', 'rgba(255, 206, 86, 0.5)', 'rgba(75, 192, 192, 0.5)'],
                }]
            },
            options: { responsive: true }
        });

        const ctx4 = document.getElementById('experience-level-distribution').getContext('2d');
        const experienceLevelChart = new Chart(ctx4, {
            type: 'bar',
            data: {
                labels: ['Junior', 'Mid', 'Senior', 'Lead'],
                datasets: [{
                    label: 'Number of Employees',
                    data: [40, 60, 30, 20],
                    backgroundColor: 'rgba(255, 159, 64, 0.5)',
                    borderColor: 'rgba(255, 159, 64, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    </script>
</body>
</html>
